name: Love Mail

on:
  workflow_dispatch:
  schedule:
    - cron: '17 12 * * *'

jobs:
  send-love-mail:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      AUTO_EMAIL_TIMEZONE: Asia/Shanghai
      AUTO_EMAIL_PROVIDER: qq
      AUTO_EMAIL_SMTP_HOST: smtp.qq.com
      AUTO_EMAIL_SMTP_PORT: '465'
      AUTO_EMAIL_USE_SSL: 'true'
      AUTO_EMAIL_SMTP_USER: ${{ secrets.QQ_SMTP_USER }}
      AUTO_EMAIL_SMTP_PASSWORD: ${{ secrets.QQ_SMTP_PASSWORD }}
      AUTO_EMAIL_FROM: ${{ secrets.QQ_SMTP_USER }}
      LOVE_MAIL_TO: ${{ secrets.LOVE_MAIL_TO }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve send mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "LOVE_FORCE_FLAG=--force-send" >> "$GITHUB_ENV"
          else
            echo "LOVE_FORCE_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Send timed greeting
        run: |
          python "plugins/auto-email/scripts/send_love_greeting.py" \
            --to "$LOVE_MAIL_TO" \
            $LOVE_FORCE_FLAG
